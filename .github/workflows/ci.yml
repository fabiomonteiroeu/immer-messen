name: ci

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Run workspace lint
        run: pnpm lint

      - name: Run workspace tests
        run: pnpm test

      - name: Run workspace typecheck
        run: pnpm typecheck
